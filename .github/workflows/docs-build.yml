name: Docs build

on:
  push:
    branches: [main, formal-release]
  pull_request:
    branches: [main]

jobs:
  mkdocs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install docs dependencies and build
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"
          bash scripts/sync_notebooks_for_docs.sh
          mkdocs build

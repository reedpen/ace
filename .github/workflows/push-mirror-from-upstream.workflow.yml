# ------------------------------------------------------------------------------
# Install in the SOURCE repo (e.g. emelon8/experiment_analysis):
#   Copy this file to:  .github/workflows/push-to-mirror.yml
#
# On the SOURCE repo → Settings → Secrets and variables → Actions:
#   MIRROR_PUSH_TOKEN — PAT for a GitHub user that can PUSH to reedpen/ace
#   (fine-grained: Contents Read and write on reedpen/ace; classic: repo with push)
#
# This runs on every push to the source repo (optional branch filter below).
# git push --mirror updates branches/tags on the mirror and prunes refs removed upstream.
# ------------------------------------------------------------------------------

name: Push mirror to reedpen/ace

# Triggers: every push (all branches/tags) + manual. To limit branches, use:
# on:
#   push:
#     branches: [main, formal-release]
#   workflow_dispatch:
on: [push, workflow_dispatch]

concurrency:
  group: push-to-mirror
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Mirror-push to reedpen/ace
        env:
          MIRROR_PUSH_TOKEN: ${{ secrets.MIRROR_PUSH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${MIRROR_PUSH_TOKEN:-}" ]; then
            echo "::error::Add repository secret MIRROR_PUSH_TOKEN (PAT with push access to reedpen/ace)."
            exit 1
          fi

          MIRROR_PUSH_TOKEN="${MIRROR_PUSH_TOKEN#"${MIRROR_PUSH_TOKEN%%[![:space:]]*}"}"
          MIRROR_PUSH_TOKEN="${MIRROR_PUSH_TOKEN%"${MIRROR_PUSH_TOKEN##*[![:space:]]}"}"
          MIRROR_PUSH_TOKEN="${MIRROR_PUSH_TOKEN//$'\r'/}"

          MIRROR_SLUG="reedpen/ace"
          if [[ "${MIRROR_PUSH_TOKEN}" == github_pat_* ]]; then
            AUTH_HEADER="Authorization: Bearer ${MIRROR_PUSH_TOKEN}"
          else
            AUTH_HEADER="Authorization: token ${MIRROR_PUSH_TOKEN}"
          fi

          git remote add mirror "https://github.com/${MIRROR_SLUG}.git"

          if ! git -c "http.extraHeader=${AUTH_HEADER}" push --mirror mirror; then
            echo "::error::Mirror push failed. Ensure the PAT can push to ${MIRROR_SLUG} (branch protection must allow this account)."
            exit 1
          fi

name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches:
      - main
      - formal-release
  workflow_dispatch:

# One deploy at a time; cancel superseded runs on the same branch
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"

      - name: Sync notebooks into docs/
        run: bash scripts/sync_notebooks_for_docs.sh

      # mkdocs gh-deploy commits to gh-pages; identity required for git push
      - name: Configure Git for gh-deploy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force

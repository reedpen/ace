# =============================================================================
# Multimodal API Configuration Template
# =============================================================================
# Usage: python src2/multimodal/multimodal_api.py --config src2/multimodal/multimodal_config.yaml
#
# This config combines Ephys, Miniscope, and Multimodal-specific parameters.
# =============================================================================

experiment:
  line_num: 96
  filenames:               # Miniscope video files
    - "0.avi"

# -----------------------------------------------------------------------------
# Ephys Parameters
# -----------------------------------------------------------------------------
ephys:
  channel_name: "PFCLFPvsCBEEG"
  remove_artifacts: false
  filter_type: "butter"
  filter_range: [0.5, 4]
  
  visualization:
    plot_channel: false
    plot_spectrogram: true
    plot_phases: true

# -----------------------------------------------------------------------------
# Miniscope Preprocessing
# -----------------------------------------------------------------------------
miniscope_preprocessing:
  crop: true
  crop_params:
    crop_with_crop: false
    crop_square: true
  detrend_method: "median"
  df_over_f: false

# -----------------------------------------------------------------------------
# Miniscope Processing (CaImAn / CNMF-E)
# -----------------------------------------------------------------------------
miniscope_processing:
  parallel: true
  n_processes: 12
  apply_motion_correction: false
  inspect_motion_correction: false  # Typically false for multimodal runs
  run_CNMFE: true
  save_estimates: true
  save_CNMFE_estimates_filename: "estimates.hdf5"

# -----------------------------------------------------------------------------
# Miniscope Postprocessing
# -----------------------------------------------------------------------------
miniscope_postprocessing:
  remove_components_with_gui: false  # Typically false for multimodal runs
  find_calcium_events: true
  derivative_for_estimates: "first"
  event_height: 5
  compute_miniscope_phase: true
  filter_data: true
  spectrogram: true
  n: 2
  cut: [0.1, 1.5]
  ftype: "butter"
  btype: "bandpass"

# -----------------------------------------------------------------------------
# Multimodal-Specific Parameters (Alignment & Joint Analysis)
# -----------------------------------------------------------------------------
multimodal:
  delete_TTLs: true              # Delete TTL artifacts from ephys signal
  fix_TTL_gaps: false            # Interpolate missing TTL pulses
  only_experiment_events: true   # Use only events during experiment window
  all_TTL_events: true           # Include all TTL events in analysis
  ca_events: false               # Use calcium events for phase analysis
  time_range: null               # Optional [start, end] in seconds, or null for full recording

# -----------------------------------------------------------------------------
# Global Settings
# -----------------------------------------------------------------------------
logging_level: "INFO"

# =============================================================================
# Ephys API Configuration Template
# =============================================================================
# Usage: python src2/ephys/ephys_api.py --config src2/ephys/ephys_config.yaml
# =============================================================================

experiment:
  line_num: 101  # Row number in experiments.csv

# -----------------------------------------------------------------------------
# Ephys-Specific Parameters
# -----------------------------------------------------------------------------
ephys:
  channel_name: "PFCLFPvsCBEEG"  # Channel to analyze (must match Neuralynx CSC name)
  remove_artifacts: false         # Remove artifacts via thresholding
  filter_type: "butter"           # Filter type: "butter", "fir", or null (no filtering)
  filter_range: [0.5, 4]          # Frequency band [low, high] in Hz
  
  visualization:
    plot_channel: true            # Plot raw/filtered signal trace
    plot_spectrogram: true        # Plot multitaper spectrogram
    plot_phases: false            # Plot instantaneous phase histogram

# -----------------------------------------------------------------------------
# Global Settings
# -----------------------------------------------------------------------------
logging_level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL

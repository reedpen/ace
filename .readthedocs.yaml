# Read the Docs — https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  jobs:
    pre_build:
      # Mirror local/CI flow: copy notebooks into docs/ for mkdocs-jupyter
      - bash scripts/sync_notebooks_for_docs.sh

mkdocs:
  configuration: mkdocs.yml

python:
  install:
    # Install everything the doc build needs except CaImAn (pip cannot resolve caiman>=1.11 on PyPI).
    # Package remains declared with caiman in pyproject.toml; use conda for CaImAn locally.
    - pip install -r docs/rtd-requirements.txt
    - pip install --no-deps -e .

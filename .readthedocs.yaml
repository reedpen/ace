# Read the Docs — https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  jobs:
    pre_build:
      # Mirror local/CI flow: copy notebooks into docs/ for mkdocs-jupyter
      - bash scripts/sync_notebooks_for_docs.sh
    # python.install only accepts structured entries (requirements / method: pip). Raw "pip install ..."
    # lines are ignored, so the default "pip install .[docs]" still ran and pulled caiman from PyPI.
    post_install:
      - python -m pip install --no-deps -e .

mkdocs:
  configuration: mkdocs.yml

python:
  install:
    # Runtime + doc deps except caiman (see docs/rtd-requirements.txt header); package still lists caiman in pyproject.toml.
    - requirements: docs/rtd-requirements.txt

# Read the Docs — https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  jobs:
    pre_build:
      # Mirror local/CI flow: copy notebooks into docs/ for mkdocs-jupyter
      - bash scripts/sync_notebooks_for_docs.sh

mkdocs:
  configuration: mkdocs.yml

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
